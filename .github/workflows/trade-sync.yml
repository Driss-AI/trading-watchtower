name: Trade Sync

on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes, 24/7
  workflow_dispatch:        # manual trigger from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger trade sync
        run: |
          curl -sS -X POST https://trading-watchtower-production.up.railway.app/api/trades/sync \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail-with-body \
            --max-time 30
