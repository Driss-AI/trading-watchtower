name: Market Alerts

on:
  schedule:
    - cron: '15 13 * * 1-5'
    - cron: '25 13 * * 1-5'
    - cron: '30 13 * * 1-5'
    - cron: '0 14 * * 1-5'
    - cron: '0 15 * * 1-5'
  workflow_dispatch:
    inputs:
      type:
        description: 'Alert type to test'
        required: true
        default: 'open'
        type: choice
        options:
          - warning15
          - warning5
          - open
          - trade
          - close

jobs:
  send-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Determine alert type from schedule
        id: alert-type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.type }}" >> $GITHUB_OUTPUT
          else
            MINUTE=$(date -u +%-M)
            HOUR=$(date -u +%-H)
            if [ "$HOUR" = "13" ] && [ "$MINUTE" = "15" ]; then
              echo "type=warning15" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "13" ] && [ "$MINUTE" = "25" ]; then
              echo "type=warning5" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "13" ] && [ "$MINUTE" = "30" ]; then
              echo "type=open" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "14" ] && [ "$MINUTE" = "0" ]; then
              echo "type=trade" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "15" ] && [ "$MINUTE" = "0" ]; then
              echo "type=close" >> $GITHUB_OUTPUT
            else
              echo "type=unknown" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Send Telegram alert
        if: steps.alert-type.outputs.type != 'unknown'
        run: |
          curl -s -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" "${{ secrets.WATCHTOWER_URL }}/api/cron/market-alerts?type=${{ steps.alert-type.outputs.type }}"
